<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simon Says</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: #414141;
        color: #ffffff;
      }
      .game-wrapper {
        background-color: #2d2d2d;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        text-align: center;
        width: 350px;
      }
      h1 {
        margin-top: 0;
      }
      .scoreboard {
        display: flex;
        justify-content: space-between;
        margin-bottom: 20px;
        font-size: 1.1rem;
      }
      .status-text {
        font-size: 1.3rem;
        font-weight: bold;
        height: 30px;
        margin-bottom: 20px;
        color: #aaa;
      }
      .board {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        width: 250px;
        height: 250px;
        margin: 0 auto 30px auto;
      }
      .board.disabled {
        pointer-events: none;
      }
      .pad {
        border-radius: 8px;
        cursor: pointer;
        opacity: 0.4;
        transition:
          opacity 0.1s ease,
          transform 0.1s ease;
      }
      .pad-0 {
        background-color: #ff3333;
        box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
      }
      .pad-1 {
        background-color: #33ff33;
        box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
      }
      .pad-2 {
        background-color: #3333ff;
        box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
      }
      .pad-3 {
        background-color: #ffff33;
        box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
      }
      .pad.active {
        opacity: 1;
        transform: scale(1.05);
        box-shadow: 0 0 20px currentColor;
      }
      .btn-start {
        background-color: #4caf50;
        color: white;
        border: none;
        padding: 12px 24px;
        font-size: 1.2rem;
        border-radius: 6px;
        cursor: pointer;
        transition: background-color 0.2s;
        width: 100%;
      }
      .btn-start:hover {
        background-color: #45a049;
      }
      .btn-start:disabled {
        background-color: #666;
        cursor: not-allowed;
        color: #aaa;
      }
    </style>
  </head>
  <body>
    <div class="game-wrapper">
      <h1>Simon Says</h1>

      <div class="scoreboard">
        <div>Уровень: <span id="current-level">0</span></div>
        <div>Рекорд: <span id="high-score">0</span></div>
      </div>

      <div class="status-text" id="status-display">Нажмите "Старт"</div>

      <div class="board disabled" id="game-board">
        <div class="pad pad-0" data-id="0"></div>
        <div class="pad pad-1" data-id="1"></div>
        <div class="pad pad-2" data-id="2"></div>
        <div class="pad pad-3" data-id="3"></div>
      </div>

      <button class="btn-start" id="start-btn">Старт</button>
    </div>

    <script src="data.js"></script>
    <script src="ui.js"></script>
    <script src="logic.js"></script>
  </body>
</html>
